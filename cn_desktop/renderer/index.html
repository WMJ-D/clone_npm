<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Clone-NPM 配置管理</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

    <div class="msg" id="msg"></div>

    <!-- ==================== 配置主页（全新布局） ==================== -->
    <div class="config-page" id="configPage">
        <!-- 顶部导航 -->
        <div class="cfg-header">
            <div class="cfg-header-left">
                <h1 class="cfg-title">Clone-NPM</h1>
                <span class="cfg-subtitle">项目配置管理中心</span>
            </div>
            <div class="cfg-header-actions">
                <button class="cfg-btn-secondary" id="addItem">
                    <span class="cfg-btn-icon">+</span> 新增项目
                </button>
                <button class="cfg-btn-secondary" id="saveAll">
                    <span class="cfg-btn-icon">💾</span> 保存配置
                </button>
                <button class="cfg-btn-secondary" id="refresh">
                    <span class="cfg-btn-icon">🔄</span> 刷新
                </button>
                <a href="#" class="cfg-nav-link" onclick="switchPage('ai-models')">
                    <span class="cfg-nav-icon">🤖</span> AI模型API
                </a>
                <a href="#" class="cfg-nav-link" onclick="switchPage('ai-chat')">
                    <span class="cfg-nav-icon">💬</span> AI智能助手
                </a>
            </div>
        </div>

        <!-- IDE 配置区 -->
        <div class="cfg-ide-panel">
            <div class="cfg-ide-header">
                <span class="cfg-ide-title">
                    <span class="cfg-ide-icon">⚙️</span>
                    IDE 配置
                </span>
                <button class="cfg-btn-add-path" id="addEditPath">+ 添加编辑器</button>
            </div>
            <div class="cfg-ide-body">
                <div class="cfg-ide-select">
                    <label>当前 IDE：</label>
                    <select id="codingEditPath">
                        <option value="">请选择编辑器路径</option>
                    </select>
                </div>
                <div id="editPathList" class="cfg-path-list"></div>
            </div>
        </div>

        <!-- 主体内容区 -->
        <div class="cfg-main">
            <!-- 左侧分组导航 -->
            <div class="cfg-sidebar">
                <div class="cfg-sidebar-header">
                    <span>📁 项目分组</span>
                    <span class="cfg-project-count" id="totalProjectCount">0</span>
                </div>
                <div class="cfg-sidebar-tabs" id="pName-tabs-list">
                    <div class="cfg-tab-all active" onclick="showAllProjects()">
                        <span class="cfg-tab-icon">📋</span>
                        <span>全部项目</span>
                    </div>
                </div>
                <!-- 已勾选执行项 -->
                <div class="cfg-enabled-section">
                    <div class="cfg-enabled-header">
                        <span>✅ 已勾选执行</span>
                        <span class="cfg-enabled-count" id="enabledCount">0</span>
                    </div>
                    <div id="enabledItemsList" class="cfg-enabled-list">
                        <div class="cfg-enabled-empty">暂无勾选</div>
                    </div>
                </div>
            </div>

            <!-- 右侧配置列表 -->
            <div class="cfg-content">
                <!-- 功能按钮栏 -->
                <div class="cfg-action-bar">
                    <button class="cfg-action-btn action-1" id="btn-1">
                        <span class="cfg-action-icon">📥</span>
                        <span class="cfg-action-text">Clone + 分支 + IDE</span>
                    </button>
                    <button class="cfg-action-btn action-2" id="btn-2">
                        <span class="cfg-action-icon">🗑️</span>
                        <span class="cfg-action-text">清除 + 重装</span>
                    </button>
                    <button class="cfg-action-btn action-3" id="btn-3">
                        <span class="cfg-action-icon">💻</span>
                        <span class="cfg-action-text">IDE 打开</span>
                    </button>
                    <button class="cfg-action-btn action-4" id="btn-4">
                        <span class="cfg-action-icon">🚀</span>
                        <span class="cfg-action-text">拉取 + 启动</span>
                    </button>
                    <button class="cfg-action-btn action-5" id="btn-5">
                        <span class="cfg-action-icon">⚡</span>
                        <span class="cfg-action-text">一键完成</span>
                    </button>
                </div>

                <!-- 终端面板和配置列表容器 -->
                <div class="cfg-list-container">
                    <!-- 配置项列表 -->
                    <div id="configList" class="cfg-config-list"></div>

                    <!-- 终端面板 -->
                    <div class="terminal-panel" id="terminalPanel">
                        <div class="terminal-header">
                            <span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="4 17 10 11 4 5"></polyline>
                                    <line x1="12" y1="19" x2="20" y2="19"></line>
                                </svg>
                                命令执行日志
                            </span>
                            <span>
                                <button class="clear-btn" id="closeTerminalBtn">关闭</button>
                                <button class="clear-btn" id="clearTerminalBtn2">清空</button>
                            </span>
                        </div>
                        <div class="log" id="terminalLog"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop">↑</button>

    <!-- ==================== AI模型API列表查询页面 ==================== -->
    <!-- ==================== AI Model IDs 查询页面 ==================== -->
    <div class="page-container" id="pageAiModels" style="display:none;">
        <div class="aim-header">
            <h1 class="aim-title">AI模型API列表</h1>
            <div class="aim-actions">
                <a href="#" onclick="switchPage('ai-chat')" class="aim-btn">AI 智能助手</a>
                <a href="#" onclick="switchPage('config')" class="aim-btn">返回配置</a>
            </div>
        </div>

        <!-- API 配置区：URL + Key + Tab 动态渲染 + 管理按钮 -->
        <div class="aim-api-info">
            <div class="aim-api-info-header">
                <div class="aim-api-tabs" id="aimApiTabsContainer"></div>
                <button id="aimManageBtn" class="aim-manage-btn" onclick="aimShowManagePanel()">⚙ 管理配置</button>
            </div>
            <div class="aim-row">
                <label>API URL：</label>
                <input type="text" id="aimApiUrl" placeholder="https://api.openai.com/v1">
            </div>
            <div class="aim-row">
                <label>API Key：</label>
                <input type="text" id="aimApiKey" placeholder="sk-xxx">
                <button id="aimFetchBtn" class="aim-fetch-btn">查询模型</button>
            </div>
        </div>

        <!-- 管理配置面板（默认隐藏） -->
        <div class="aim-manage-panel" id="aimManagePanel" style="display:none;">
            <div class="aim-manage-header">
                <h3>API 配置管理</h3>
                <button class="aim-manage-close" onclick="aimHideManagePanel()">×</button>
            </div>
            <div class="aim-manage-list" id="aimManageList"></div>
            <div class="aim-manage-add">
                <input type="text" id="aimNewName" placeholder="配置名称，如：API 5">
                <input type="text" id="aimNewUrl" placeholder="API URL，如：https://api.example.com/v1">
                <input type="text" id="aimNewKey" placeholder="API Key，如：sk-xxx">
                <button class="aim-add-btn" onclick="aimAddConfig()">+ 新增配置</button>
            </div>
        </div>

        <!-- 结果区：分组Tab + 模型网格 -->
        <div class="aim-section-title">模型分类</div>
        <div class="aim-tabs" id="aimTabs"></div>
        <div class="aim-stats" id="aimStats"></div>
        <div id="aimContent">
            <div class="aim-loading aim-placeholder">请点击「查询模型」获取可用模型列表</div>
        </div>

        <!-- AI 对话区域 -->
        <div class="aim-chat-section">
            <div class="aim-chat-header">
                <h3>💬 AI 对话</h3>
                <div class="aim-chat-settings">
                    <label>模型：</label>
                    <select id="aimChatModel">
                        <option value="">请先查询模型</option>
                    </select>
                </div>
            </div>
            <div class="aim-chat-messages" id="aimChatMessages">
                <div class="aim-chat-welcome">
                    <span>输入消息开始对话，支持流式输出</span>
                </div>
            </div>
            <div class="aim-chat-input-area">
                <textarea id="aimChatInput" placeholder="输入消息... (Shift+Enter 换行，Enter 发送)" rows="1"></textarea>
                <button id="aimChatSendBtn" onclick="aimChatSend()" disabled>发送</button>
            </div>
        </div>

        <div class="aim-toast" id="aimToast"></div>
    </div>

    <!-- ====================  AI 智能助手导航页面 ==================== -->
    <div class="page-container" id="pageAiChat" style="display:none;">
        <div class="ai-page-header">
            <h2>AI 智能助手</h2>
            <a href="#" onclick="switchPage('config')">← 返回配置页</a>
        </div>
        <h2 class="chat-section-title">国产 AI 平台</h2>
        <div class="ai-grid" id="aiDomesticGrid"></div>
        <h2 class="chat-section-title">国外 AI 平台</h2>
        <div class="ai-grid" id="aiForeignGrid"></div>
    </div>

    <script src="./scripts/app.js"></script>
</body>
</html>
