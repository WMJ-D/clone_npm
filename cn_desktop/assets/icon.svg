<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338ca" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- 圆角背景 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- 光泽层 -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#shine)"/>
  <!-- 终端窗口 -->
  <rect x="96" y="120" width="320" height="272" rx="20" ry="20" fill="#1e1b4b" opacity="0.85"/>
  <!-- 终端标题栏 -->
  <rect x="96" y="120" width="320" height="40" rx="20" ry="20" fill="#312e81"/>
  <rect x="96" y="140" width="320" height="20" fill="#312e81"/>
  <!-- 标题栏圆点 -->
  <circle cx="124" cy="140" r="7" fill="#f87171"/>
  <circle cx="148" cy="140" r="7" fill="#fbbf24"/>
  <circle cx="172" cy="140" r="7" fill="#34d399"/>
  <!-- 命令行符号 > -->
  <text x="128" y="210" font-family="Consolas, monospace" font-size="36" font-weight="bold" fill="#34d399">$</text>
  <!-- clone 文字 -->
  <text x="164" y="210" font-family="Consolas, monospace" font-size="32" font-weight="bold" fill="#e0e7ff">git clone</text>
  <!-- npm 文字 -->
  <text x="128" y="260" font-family="Consolas, monospace" font-size="36" font-weight="bold" fill="#34d399">$</text>
  <text x="164" y="260" font-family="Consolas, monospace" font-size="32" font-weight="bold" fill="#fbbf24">npm install</text>
  <!-- 光标闪烁线 -->
  <rect x="128" y="290" width="16" height="28" rx="2" fill="#a78bfa" opacity="0.8"/>
  <!-- 底部 CN 标识 -->
  <text x="256" y="370" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#818cf8" text-anchor="middle" letter-spacing="4">CLONE-NPM</text>
</svg>
